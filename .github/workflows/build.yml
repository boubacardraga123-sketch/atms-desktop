name: Build ATMS Desktop

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build exe
        run: npm run build

      - name: Upload exe
        uses: actions/upload-artifact@v3
        with:
          name: ATMS-Setup
          path: dist/*.exe
